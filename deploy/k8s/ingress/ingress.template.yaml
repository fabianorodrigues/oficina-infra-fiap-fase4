# Shared internal Ingress for the oficina platform.
#
# This file is a template. Do not apply it directly.
# scripts/render-ingress.ps1 replaces the upper-case tokens (delimited by double
# underscores) with values taken from config/ingress-routes.json and the two
# private subnet IDs that the deploy workflow reads from SSM. Only the rendered
# manifest is validated and applied.
#
# The IngressClass "alb" is owned by the Platform (created by the AWS Load
# Balancer Controller Helm chart, createIngressClassResource=true). This repo
# only references it; it does not create a second IngressClass with the same name.
#
# Health header routing: the API Gateway rewrites external /health/<service> to
# /health and sets the trusted internal header x-oficina-health-target. Three
# annotation-based actions (health-cadastro/estoque/ordens) forward /health to the
# matching Service only when that header value matches, so the condition never
# applies to the functional /api/* rules of the same Service. The health rules are
# rendered before the functional rules.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oficina
  namespace: oficina
  labels:
    app.kubernetes.io/name: oficina
    app.kubernetes.io/part-of: oficina
    app.kubernetes.io/managed-by: oficina-infra-fiap-fase4
  annotations:
    alb.ingress.kubernetes.io/load-balancer-name: __LOAD_BALANCER_NAME__
    alb.ingress.kubernetes.io/scheme: __SCHEME__
    alb.ingress.kubernetes.io/target-type: __TARGET_TYPE__
    alb.ingress.kubernetes.io/listen-ports: '__LISTEN_PORTS__'
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: __HEALTHCHECK_PATH__
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/success-codes: '__SUCCESS_CODES__'
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '__HEALTHCHECK_INTERVAL__'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '__HEALTHCHECK_TIMEOUT__'
    alb.ingress.kubernetes.io/healthy-threshold-count: '__HEALTHY_THRESHOLD__'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '__UNHEALTHY_THRESHOLD__'
    alb.ingress.kubernetes.io/target-group-attributes: __TARGET_GROUP_ATTRIBUTES__
    alb.ingress.kubernetes.io/load-balancer-attributes: __LOAD_BALANCER_ATTRIBUTES__
    alb.ingress.kubernetes.io/subnets: __PRIVATE_SUBNETS__
__HEALTH_ANNOTATIONS__
spec:
  ingressClassName: __INGRESS_CLASS_NAME__
  rules:
    - http:
        paths:
__INGRESS_PATHS__
