name: Observability Secret Sync

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type SYNC to synchronize the New Relic license key."
        required: true

permissions:
  contents: read

concurrency:
  group: observability-secret-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Validate branch and confirmation
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -ne "refs/heads/main") { throw "Use main only." }
          if ("${{ inputs.confirmation }}" -ne "SYNC") { throw "Confirmation must be SYNC." }
          if ([string]::IsNullOrWhiteSpace("${{ vars.AWS_REGION }}")) { throw "AWS_REGION variable is required." }
          if ([string]::IsNullOrWhiteSpace("${{ secrets.NEW_RELIC_LICENSE_KEY }}")) { throw "NEW_RELIC_LICENSE_KEY secret is required." }

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: STS
        run: aws sts get-caller-identity

      - name: Validate secret container
        run: aws secretsmanager describe-secret --secret-id /oficina/observability/new-relic --region "${{ vars.AWS_REGION }}"

      - name: Sync New Relic license key
        shell: pwsh
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
        run: ./scripts/sync-newrelic-secret.ps1

      - name: Validate AWSCURRENT
        run: aws secretsmanager list-secret-version-ids --secret-id /oficina/observability/new-relic --include-deprecated --region "${{ vars.AWS_REGION }}"

      - name: Summary
        run: echo "New Relic license key synchronized without printing payload." >> "$GITHUB_STEP_SUMMARY"
