name: Entrypoint Deploy

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type APPLY to create API Gateway, VPC Link and integrations from main.'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: entrypoint
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy entrypoint
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_STATE_KEY_ENTRYPOINT: oficina/entrypoint/terraform.tfstate
      TF_STATE_BUCKET_FALLBACK: ${{ vars.TF_STATE_BUCKET }}
      API_NAME: oficina-api
      VPC_LINK_NAME: oficina
      ALB_NAME: oficina
      HEALTH_HEADER: x-oficina-health-target
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate request
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:GITHUB_REF -ne 'refs/heads/main') { throw 'This workflow must run from main.' }
          if ('${{ inputs.confirmation }}' -cne 'APPLY') { throw 'Confirmation must be APPLY.' }
          if ([string]::IsNullOrWhiteSpace($env:AWS_REGION)) { throw 'Repository Variable AWS_REGION is required.' }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Validate entrypoint configuration
        shell: pwsh
        run: ./scripts/validate-entrypoint-config.ps1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve Terraform backend
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $identity = aws sts get-caller-identity --output json | ConvertFrom-Json
          $deterministicBucket = "oficina-terraform-state-$($identity.Account)-$env:AWS_REGION"
          $bucket = $deterministicBucket
          if (-not [string]::IsNullOrWhiteSpace($env:TF_STATE_BUCKET_FALLBACK) -and $env:TF_STATE_BUCKET_FALLBACK -ne $deterministicBucket) {
            aws s3api head-bucket --bucket $deterministicBucket 2>$null
            if ($LASTEXITCODE -ne 0) { $bucket = $env:TF_STATE_BUCKET_FALLBACK }
          }
          aws s3api head-bucket --bucket $bucket
          "TF_STATE_BUCKET=$bucket" | Add-Content -Path $env:GITHUB_ENV
          "AWS_ACCOUNT_ID=$($identity.Account)" | Add-Content -Path $env:GITHUB_ENV

      - name: Validate platform ALB and services
        shell: bash
        run: |
          set -euo pipefail
          vpc=$(aws ssm get-parameter --name /oficina/infra/vpc/id --region "$AWS_REGION" --query Parameter.Value --output text)
          subnet1=$(aws ssm get-parameter --name /oficina/infra/subnets/private/1 --region "$AWS_REGION" --query Parameter.Value --output text)
          subnet2=$(aws ssm get-parameter --name /oficina/infra/subnets/private/2 --region "$AWS_REGION" --query Parameter.Value --output text)
          alb_dns=$(aws ssm get-parameter --name /oficina/infra/alb/dns-name --region "$AWS_REGION" --query Parameter.Value --output text)
          lb_arn=$(aws ssm get-parameter --name /oficina/infra/alb/arn --region "$AWS_REGION" --query Parameter.Value --output text)
          listener_arn=$(aws ssm get-parameter --name /oficina/infra/alb/listener-arn --region "$AWS_REGION" --query Parameter.Value --output text)
          test -n "$vpc" && test "$subnet1" != "$subnet2" && test -n "$alb_dns" && test -n "$lb_arn" && test -n "$listener_arn"
          scheme=$(aws elbv2 describe-load-balancers --load-balancer-arns "$lb_arn" --region "$AWS_REGION" --query 'LoadBalancers[0].Scheme' --output text)
          test "$scheme" = "internal"
          proto=$(aws elbv2 describe-listeners --listener-arns "$listener_arn" --region "$AWS_REGION" --query 'Listeners[0].Protocol' --output text)
          test "$proto" = "HTTP"
          for target in cadastro estoque ordens; do
            tg=$(aws ssm get-parameter --name "/oficina/infra/ecs/${target}/target-group-arn" --region "$AWS_REGION" --query Parameter.Value --output text)
            deadline=$((SECONDS + 600))
            while true; do
              health=$(aws elbv2 describe-target-health --target-group-arn "$tg" --region "$AWS_REGION" --output json)
              target_count=$(jq '.TargetHealthDescriptions | length' <<< "$health")
              healthy_count=$(jq '[.TargetHealthDescriptions[] | select(.TargetHealth.State == "healthy")] | length' <<< "$health")
              if [ "$target_count" -gt 0 ] && [ "$healthy_count" -eq "$target_count" ]; then
                echo "Target group for ${target} is healthy (${healthy_count}/${target_count})."
                break
              fi
              if [ "$SECONDS" -ge "$deadline" ]; then
                if [ "$target_count" -eq 0 ]; then
                  echo "Target group for ${target} has no registered ECS targets. Deploy the ${target} service before Entrypoint Deploy." >&2
                else
                  echo "Target group for ${target} is not fully healthy:" >&2
                  jq -r '.TargetHealthDescriptions[] | "  target=\(.Target.Id):\(.Target.Port) state=\(.TargetHealth.State) reason=\(.TargetHealth.Reason // "-") description=\(.TargetHealth.Description // "-")"' <<< "$health" >&2
                fi
                exit 1
              fi
              echo "Waiting for ${target} target group health (${healthy_count}/${target_count} healthy)..."
              sleep 20
            done
          done
          {
            echo "VPC_ID=$vpc"
            echo "ALB_ARN=$lb_arn"
            echo "ALB_LISTENER_ARN=$listener_arn"
            echo "ALB_DNS=$alb_dns"
            echo "ALB_SCHEME=$scheme"
          } >> "$GITHUB_ENV"

      - name: Validate Auth Lambdas and live aliases
        shell: bash
        run: |
          set -euo pipefail
          for p in /oficina/auth/cpf/function-name /oficina/auth/authorizer/function-name; do
            fn=$(aws ssm get-parameter --name "$p" --region "$AWS_REGION" --query Parameter.Value --output text)
            aws lambda get-function --function-name "$fn" --region "$AWS_REGION" >/dev/null
            aws lambda get-alias --function-name "$fn" --name live --region "$AWS_REGION" >/dev/null
          done

      - name: Terraform fmt
        working-directory: terraform/entrypoint
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform/entrypoint
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_ENTRYPOINT}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform validate
        working-directory: terraform/entrypoint
        run: terraform validate

      - name: TFLint
        working-directory: terraform/entrypoint
        run: tflint --init && tflint --recursive

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/entrypoint
          quiet: true
          framework: terraform

      - name: Terraform plan
        working-directory: terraform/entrypoint
        run: terraform plan -input=false -out=tfplan -var="aws_region=${AWS_REGION}"

      - name: Publish plan summary
        working-directory: terraform/entrypoint
        run: |
          set -euo pipefail
          terraform show -json tfplan > plan.json
          blocked=$(jq '[.resource_changes[]? | select(.type | IN("aws_apigatewayv2_api","aws_apigatewayv2_vpc_link","aws_lambda_permission","aws_cloudwatch_log_group","aws_ssm_parameter")) | select(.change.actions | index("delete"))] | length' plan.json)
          if [ "$blocked" -gt 0 ]; then
            echo "Terraform plan contains delete actions for protected entrypoint resources." >&2
            exit 1
          fi
          {
            echo '## Entrypoint Terraform Plan'
            echo
            echo '| Action | Count |'
            echo '| --- | ---: |'
            for action in create update delete; do
              c=$(jq "[.resource_changes[]? | select(.change.actions | index(\"$action\"))] | length" plan.json)
              echo "| $action | $c |"
            done
          } >> "$GITHUB_STEP_SUMMARY"
          rm -f plan.json

      - name: Terraform apply
        working-directory: terraform/entrypoint
        run: terraform apply -input=false tfplan

      - name: Capture outputs
        working-directory: terraform/entrypoint
        run: |
          set -euo pipefail
          {
            echo "API_ID=$(terraform output -raw api_id)"
            echo "API_ENDPOINT=$(terraform output -raw api_endpoint)"
            echo "VPC_LINK_ID=$(terraform output -raw vpc_link_id)"
          } >> "$GITHUB_ENV"

      - name: Wait for VPC Link AVAILABLE
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 1800))
          status=none
          while [ $SECONDS -lt $deadline ]; do
            status=$(aws apigatewayv2 get-vpc-link --vpc-link-id "$VPC_LINK_ID" --region "$AWS_REGION" --query VpcLinkStatus --output text 2>/dev/null || echo none)
            echo "VPC Link status: $status"
            [ "$status" = AVAILABLE ] && break
            [ "$status" = FAILED ] && exit 1
            sleep 30
          done
          test "$status" = AVAILABLE

      - name: Read-only entrypoint validation
        shell: pwsh
        run: ./scripts/validate-entrypoint.ps1 -Region "$env:AWS_REGION" -ApiName "$env:API_NAME" -VpcLinkName "$env:VPC_LINK_NAME" -AlbName "$env:ALB_NAME"

      - name: Smoke test API
        shell: pwsh
        run: ./scripts/smoke-test-api.ps1 -BaseUrl "$env:API_ENDPOINT"

      - name: Publish summary
        if: always()
        run: |
          {
            echo '## Entrypoint Deploy'
            echo
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Account ID: ${AWS_ACCOUNT_ID:-unknown}"
            echo "- Region: ${AWS_REGION}"
            echo "- Terraform state bucket: ${TF_STATE_BUCKET:-unknown}"
            echo "- Terraform state key: ${TF_STATE_KEY_ENTRYPOINT}"
            echo "- ALB name: ${ALB_NAME}"
            echo "- ALB scheme: ${ALB_SCHEME:-unknown}"
            echo "- ALB DNS: ${ALB_DNS:-unknown}"
            echo "- API name: ${API_NAME}"
            echo "- API id: ${API_ID:-unknown}"
            echo "- API endpoint: ${API_ENDPOINT:-unknown}"
            echo "- VPC Link: ${VPC_LINK_NAME} (${VPC_LINK_ID:-unknown})"
            echo "- Health header: ${HEALTH_HEADER}"
            echo
            echo 'Sensitive values were not printed.'
          } >> "$GITHUB_STEP_SUMMARY"
