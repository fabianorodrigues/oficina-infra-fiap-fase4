name: Platform CI

on:
  pull_request:
    branches: [main]
    paths:
      - config/**
      - terraform/**
      - scripts/**
      - .github/workflows/platform-ci.yml
      - .github/workflows/platform-deploy.yml
      - .github/workflows/entrypoint-deploy.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Static validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5
      - name: Validate JSON
        run: |
          set -euo pipefail
          jq empty config/entrypoint.json
      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem -Path scripts -Filter *.ps1 -File | ForEach-Object {
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) { $errors | ForEach-Object { Write-Error "$($_.Extent.File): $($_.Message)" }; exit 1 }
          }
      - name: Terraform fmt platform
        working-directory: terraform/platform
        run: terraform fmt -check -recursive
      - name: Terraform init platform
        working-directory: terraform/platform
        run: terraform init -backend=false
      - name: Terraform validate platform
        working-directory: terraform/platform
        run: terraform validate
      - name: Terraform fmt entrypoint
        working-directory: terraform/entrypoint
        run: terraform fmt -check -recursive
      - name: Terraform init entrypoint
        working-directory: terraform/entrypoint
        run: terraform init -backend=false
      - name: Terraform validate entrypoint
        working-directory: terraform/entrypoint
        run: terraform validate
      - name: Static safety checks
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $text = (Get-ChildItem -Path config,terraform,scripts -Recurse -File | ForEach-Object { Get-Content -Raw -LiteralPath $_.FullName }) -join "`n"
          foreach ($pattern in @('kubectl', 'helm', 'aws\s+eks', 'deploy/k8s', 'secretproviderclass', 'secrets-store\.csi')) {
            if ($text -match $pattern) { throw "Legacy platform pattern found: $pattern" }
          }
      - name: Publish summary
        run: |
          echo 'Validated platform/entrypoint Terraform, contracts, scripts and static safety checks.' >> "$GITHUB_STEP_SUMMARY"
