name: Entrypoint CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'config/entrypoint.json'
      - 'config/ingress-routes.json'
      - 'config/resource-contract.yml'
      - 'terraform/entrypoint/**'
      - 'deploy/k8s/ingress/**'
      - 'scripts/validate-entrypoint-config.ps1'
      - 'scripts/validate-entrypoint.ps1'
      - 'scripts/validate-route-contract.ps1'
      - 'scripts/smoke-test-api.ps1'
      - 'scripts/validate-ingress-config.ps1'
      - 'scripts/render-ingress.ps1'
      - '.github/workflows/entrypoint-*.yml'
      - '.github/workflows/ingress-*.yml'
      - '.tflint.hcl'

permissions:
  contents: read

jobs:
  static-validation:
    name: Static validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.5

      # Disposable local cluster (not EKS, no AWS) so the client dry-run can
      # resolve built-in schemas offline. --dry-run=client creates nothing.
      - name: Setup throwaway kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: entrypoint-ci

      - name: Validate JSON is well formed
        run: |
          jq empty config/entrypoint.json
          jq empty config/ingress-routes.json

      - name: Validate entrypoint configuration
        shell: pwsh
        run: ./scripts/validate-entrypoint-config.ps1

      - name: Validate route contract
        shell: pwsh
        run: ./scripts/validate-route-contract.ps1

      - name: Validate ingress configuration
        shell: pwsh
        run: ./scripts/validate-ingress-config.ps1

      - name: Validate SSM contract outputs
        shell: pwsh
        run: |
          $contract = Get-Content config/resource-contract.yml -Raw
          $expected = @(
            'apiId: /oficina/infra/api/id',
            'apiUrl: /oficina/infra/api/url',
            'apiExecutionArn: /oficina/infra/api/execution-arn',
            'apiStage: /oficina/infra/api/stage',
            'vpcLinkId: /oficina/infra/api/vpc-link-id'
          )
          foreach ($e in $expected) {
            if ($contract -notmatch [regex]::Escape($e)) { throw "resource-contract.yml is missing output '$e'." }
          }
          Write-Host 'SSM contract outputs are present.'

      - name: Render ingress with synthetic subnets
        shell: pwsh
        run: |
          ./scripts/render-ingress.ps1 `
            -OutputDirectory "$env:RUNNER_TEMP/ingress" `
            -PrivateSubnet1 'subnet-00000000000000001' `
            -PrivateSubnet2 'subnet-00000000000000002'

      - name: Confirm no placeholders remain
        shell: pwsh
        run: |
          $rendered = Get-Content "$env:RUNNER_TEMP/ingress/ingress.rendered.yaml" -Raw
          if ($rendered -match '__[A-Z0-9_]+__') { throw 'Rendered manifest still contains placeholders.' }
          Write-Host 'No placeholders in rendered manifest.'

      - name: Kubeconform rendered ingress
        run: |
          set -euo pipefail
          version=v0.6.7
          curl -sSLo kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/${version}/kubeconform-linux-amd64.tar.gz"
          tar -xf kubeconform.tar.gz kubeconform
          ./kubeconform -strict -summary "$RUNNER_TEMP/ingress/ingress.rendered.yaml"

      - name: kubectl apply dry-run (client)
        run: kubectl apply --dry-run=client -f "$RUNNER_TEMP/ingress/ingress.rendered.yaml"

      - name: Terraform fmt
        working-directory: terraform/entrypoint
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform/entrypoint
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform/entrypoint
        run: terraform validate

      - name: Terraform providers
        working-directory: terraform/entrypoint
        run: terraform providers

      - name: TFLint
        working-directory: terraform/entrypoint
        run: |
          tflint --init
          tflint --recursive

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/entrypoint
          quiet: true
          framework: terraform

      - name: PowerShell AST
        shell: pwsh
        run: |
          $scripts = @(
            'scripts/validate-entrypoint-config.ps1',
            'scripts/validate-route-contract.ps1',
            'scripts/validate-entrypoint.ps1',
            'scripts/smoke-test-api.ps1',
            'scripts/validate-ingress-config.ps1',
            'scripts/render-ingress.ps1'
          )
          foreach ($file in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              throw "PowerShell parse errors in $file."
            }
          }
          Write-Host 'PowerShell AST parse succeeded.'

      - name: Actionlint
        uses: raven-actions/actionlint@v2

      - name: Forbidden route keys
        run: |
          set -euo pipefail
          bad=$(jq -r '.routes[].routeKey' config/entrypoint.json | grep -E '/(ready|api/internal|api/dev)(/|$)' || true)
          if [ -n "$bad" ]; then echo "Forbidden route keys exposed:"; echo "$bad"; exit 1; fi
          catchall=$(jq -r '.routes[].routeKey' config/entrypoint.json | grep -E '^(\$default|ANY /\{proxy\+\}|ANY /api/\{proxy\+\}|ANY /)$' || true)
          if [ -n "$catchall" ]; then echo "Catch-all route keys present:"; echo "$catchall"; exit 1; fi
          echo 'No forbidden or catch-all route keys.'

      - name: Static safety searches
        shell: pwsh
        run: |
          $tfAndFlow = @('terraform/entrypoint/*', '.github/workflows/entrypoint-*.yml')
          $allEntrypoint = @('config/entrypoint.json', 'terraform/entrypoint/*', 'scripts/validate-entrypoint*.ps1', 'scripts/validate-route-contract.ps1', 'scripts/smoke-test-api.ps1', '.github/workflows/entrypoint-*.yml', 'terraform/entrypoint/README.md')

          function Assert-NoMatch {
            param([string[]]$Files, [string]$Pattern, [string]$Label)
            $found = Select-String -Path $Files -Pattern $Pattern -SimpleMatch -ErrorAction SilentlyContinue
            if ($found) {
              $found | Format-Table Path, LineNumber, Line -AutoSize | Out-String | Write-Host
              throw "Forbidden pattern found ($Label)."
            }
          }

          # No destroy / delete of the entrypoint.
          Assert-NoMatch $allEntrypoint ('terraform ' + 'destroy') 'tf-destroy'
          Assert-NoMatch $allEntrypoint ('delete-' + 'api') 'delete-api'
          Assert-NoMatch $allEntrypoint ('delete-' + 'vpc-link') 'delete-vpc-link'

          # No public ALB / open CIDR anywhere in the stack.
          Assert-NoMatch $tfAndFlow ('internet' + '-facing') 'internet-facing'
          Assert-NoMatch $tfAndFlow '0.0.0.0/0' 'open-cidr'

          # No unaliased Lambda, no secret reads, no cross-stack state.
          Assert-NoMatch $tfAndFlow ('function:$' + 'LATEST') 'lambda-latest'
          Assert-NoMatch $tfAndFlow ('get-secret' + '-value') 'get-secret-value'
          Assert-NoMatch $allEntrypoint ('JWT_SIGNING' + '_KEY') 'jwt-key'
          Assert-NoMatch $tfAndFlow ('Secret' + 'String') 'secretstring'
          Assert-NoMatch $tfAndFlow ('terraform' + '_remote_state') 'remote-state'

          # Authorizer hardening must not be weakened.
          Assert-NoMatch $tfAndFlow ('authorizer_result_ttl_in_seconds = ' + '300') 'authorizer-cache'
          Assert-NoMatch $tfAndFlow ('enable_simple_responses = ' + 'false') 'simple-responses-off'

          # No legacy phase or environment suffixes.
          Assert-NoMatch $allEntrypoint ('Fase' + '3') 'legacy-phase'
          Assert-NoMatch $allEntrypoint ('fase' + '-3') 'legacy-phase-dash'

          # Secret value assignments must never carry a value.
          foreach ($s in @(('AWS_ACCESS_KEY_ID' + '='), ('AWS_SECRET_ACCESS_KEY' + '='), ('AWS_SESSION_TOKEN' + '='))) {
            $m = Select-String -Path $allEntrypoint -Pattern ($s + '\S') -ErrorAction SilentlyContinue
            if ($m) { $m | Format-Table Path, LineNumber -AutoSize | Out-String | Write-Host; throw "Secret value assignment found ($s)." }
          }

          Write-Host 'Static safety searches passed.'

      - name: Summary
        run: |
          {
            echo '### Entrypoint CI'
            echo
            echo 'Static validation concluida. Nenhum recurso AWS foi acessado.'
            echo 'API Gateway, VPC Link e integracoes reais serao criados apenas pelo Entrypoint Deploy apos merge na main.'
          } >> "$GITHUB_STEP_SUMMARY"
