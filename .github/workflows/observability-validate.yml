name: Observability Validate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate ECS observability
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Validate region
        run: test -n "$AWS_REGION"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Validate log groups and metrics surface
        run: |
          set -euo pipefail
          cluster=$(aws ssm get-parameter --name /oficina/infra/cluster/name --region "$AWS_REGION" --query Parameter.Value --output text)
          aws ecs describe-clusters --clusters "$cluster" --region "$AWS_REGION" --include SETTINGS >/dev/null
          for group in /ecs/oficina/cadastro /ecs/oficina/estoque /ecs/oficina/ordens /ecs/oficina/db-bootstrap /aws/apigateway/oficina-api; do
            aws logs describe-log-groups --log-group-name-prefix "$group" --region "$AWS_REGION" --query 'logGroups[0].logGroupName' --output text | grep -v '^None$'
          done
          aws cloudwatch list-metrics --namespace AWS/ECS --metric-name CPUUtilization --region "$AWS_REGION" >/dev/null
          aws cloudwatch list-metrics --namespace AWS/ApplicationELB --metric-name HealthyHostCount --region "$AWS_REGION" >/dev/null
      - name: Publish summary
        run: echo 'ECS, API Gateway and ALB observability surfaces validated.' >> "$GITHUB_STEP_SUMMARY"
