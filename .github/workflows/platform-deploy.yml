name: Platform Deploy

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type APPLY to reconcile the ECS platform from main.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: platform
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ECS platform
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_STATE_KEY_PLATFORM: oficina/platform/terraform.tfstate
      TF_STATE_BUCKET_FALLBACK: ${{ vars.TF_STATE_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate request
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:GITHUB_REF -ne 'refs/heads/main') { throw 'This workflow must run from main.' }
          if ('${{ inputs.confirmation }}' -cne 'APPLY') { throw 'Confirmation must be APPLY.' }
          if ([string]::IsNullOrWhiteSpace($env:AWS_REGION)) { throw 'Repository Variable AWS_REGION is required.' }
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Resolve Terraform backend
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $identity = aws sts get-caller-identity --output json | ConvertFrom-Json
          $deterministicBucket = "oficina-terraform-state-$($identity.Account)-$env:AWS_REGION"
          $bucket = $deterministicBucket
          if (-not [string]::IsNullOrWhiteSpace($env:TF_STATE_BUCKET_FALLBACK) -and $env:TF_STATE_BUCKET_FALLBACK -ne $deterministicBucket) {
            aws s3api head-bucket --bucket $deterministicBucket 2>$null
            if ($LASTEXITCODE -ne 0) { $bucket = $env:TF_STATE_BUCKET_FALLBACK }
          }
          aws s3api head-bucket --bucket $bucket
          "TF_STATE_BUCKET=$bucket" | Add-Content -Path $env:GITHUB_ENV
          "AWS_ACCOUNT_ID=$($identity.Account)" | Add-Content -Path $env:GITHUB_ENV
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
      - name: Validate prerequisites
        run: |
          set -euo pipefail
          for p in /oficina/infra/vpc/id /oficina/infra/subnets/private/1 /oficina/infra/subnets/private/2 /oficina/infra/rds/security-group-id; do
            aws ssm get-parameter --name "$p" --region "$AWS_REGION" >/dev/null
          done
      - name: Terraform fmt
        working-directory: terraform/platform
        run: terraform fmt -check -recursive
      - name: Terraform init
        working-directory: terraform/platform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_PLATFORM}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"
      - name: Terraform validate
        working-directory: terraform/platform
        run: terraform validate
      - name: TFLint
        working-directory: terraform/platform
        run: tflint --init && tflint --recursive
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/platform
          framework: terraform
          quiet: true
      - name: Terraform plan
        working-directory: terraform/platform
        run: terraform plan -input=false -out=tfplan -var="aws_region=${AWS_REGION}"
      - name: Validate plan safety
        working-directory: terraform/platform
        run: |
          set -euo pipefail
          terraform show -json tfplan > tfplan.json
          protected='["aws_ecs_cluster","aws_lb","aws_lb_target_group","aws_lb_listener","aws_ecr_repository","aws_sqs_queue","aws_security_group","aws_cloudwatch_log_group","aws_ssm_parameter"]'
          blocked=$(jq --argjson protected "$protected" '[.resource_changes[]? | select(.type as $t | $protected | index($t)) | select(.change.actions | index("delete"))] | length' tfplan.json)
          if [ "$blocked" -gt 0 ]; then
            echo 'Terraform plan contains delete actions for protected platform resources.' >&2
            exit 1
          fi
      - name: Terraform apply
        working-directory: terraform/platform
        run: terraform apply -input=false tfplan
      - name: Validate ECS platform
        run: |
          set -euo pipefail
          cluster=$(aws ssm get-parameter --name /oficina/infra/cluster/name --region "$AWS_REGION" --query Parameter.Value --output text)
          aws ecs describe-clusters --clusters "$cluster" --region "$AWS_REGION" --query 'clusters[0].status' --output text | grep -q ACTIVE
          alb=$(aws ssm get-parameter --name /oficina/infra/alb/arn --region "$AWS_REGION" --query Parameter.Value --output text)
          aws elbv2 describe-load-balancers --load-balancer-arns "$alb" --region "$AWS_REGION" --query 'LoadBalancers[0].Scheme' --output text | grep -q internal
          for service in cadastro estoque ordens; do
            aws ssm get-parameter --name "/oficina/infra/ecs/${service}/target-group-arn" --region "$AWS_REGION" >/dev/null
            aws ssm get-parameter --name "/oficina/infra/ecs/${service}/log-group-name" --region "$AWS_REGION" >/dev/null
          done
      - name: Publish summary
        run: |
          {
            echo '## Platform Deploy'
            echo
            echo "- Account ID: ${AWS_ACCOUNT_ID}"
            echo "- Region: ${AWS_REGION}"
            echo "- Terraform state bucket: ${TF_STATE_BUCKET}"
            echo "- Terraform state key: ${TF_STATE_KEY_PLATFORM}"
            echo '- ECS cluster, ALB, target groups, log groups, ECR and SQS validated.'
          } >> "$GITHUB_STEP_SUMMARY"
